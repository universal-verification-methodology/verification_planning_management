- type: section
  title: Design architecture
- type: two_column
  title: 1. Multi-agent / multi-channel TB
  left:
  - Multiple agents (per interface or channel) coordinated by env and virtual sequences.
  - 'Layered architecture: block agents → fabric/scoreboard → subsystem scenarios
    (`MULTI_AGENT_ARCHITECTURE.md`).'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE6 Design Architecture.
- type: two_column
  title: 2. Protocol verification layer
  left:
  - Dedicated protocol checker (SVA or monitor-based) separate from scoreboard data
    checks.
  - '`PROTOCOL_VERIFICATION_PLAN.md` lists rules, coverage, and integration with agents.'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE6 Design Architecture.
- type: bullets
  title: 3. System integration view
  bullets:
  - '`INTEGRATION_PLAN.md` describes how block-level env connects to subsystem tests.'
  - Reuse agents/VIP across DUT variants via configuration and factory overrides.
  notes: From MODULE6 Design Architecture.
