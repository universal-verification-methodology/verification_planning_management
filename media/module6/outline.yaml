- type: section
  title: Verification & testing methods
- type: two_column
  title: 1. Protocol rule testing
  left:
  - Each protocol rule maps to checker fires, coverpoints, and at least one directed
    or random test.
  - Illegal sequences and corner timing documented with expected checker behavior.
  right: assets/diagrams/testing_methods.png
  notes: From MODULE6 Verification & Testing Methods.
- type: bullets
  title: 2. Multi-agent scenario testing
  bullets:
  - Virtual sequences stress cross-agent ordering, arbitration, and backpressure.
  - System scoreboard validates end-to-end data and sideband signals.
  notes: From MODULE6 Verification & Testing Methods.
- type: bullets
  title: 3. Maintainability reviews
  bullets:
  - Architecture review before adding agents — avoid duplicate monitors and conflicting
    checkers.
  - '`./scripts/module6.sh --check` validates multi-agent and protocol planning artifacts.'
  notes: From MODULE6 Verification & Testing Methods.
