- type: section
  title: Design architecture
- type: two_column
  title: 1. Coverage in the UVM environment
  left:
  - Functional coverage lives in `common_dut/tb/stream_fifo_coverage.sv` (covergroups,
    crosses).
  - Monitors/agents sample transactions that feed coverpoints (fill level, handshake
    patterns, errors).
  - '`COVERAGE_DESIGN.md` is the authoritative map from requirements → coverpoints
    → tests.'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE3 Design Architecture.
- type: two_column
  title: 2. Code coverage integration
  left:
  - Simulator line/branch/FSM coverage configured in your run scripts (documented
    in `COVERAGE_RUN.md`).
  - 'Separate functional vs code coverage roles: intent vs implementation exercised.'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE3 Design Architecture.
- type: bullets
  title: 3. Coverage run and merge pipeline
  bullets:
  - 'Run: select CORE-tier tests → enable functional + code coverage in simulator
    → save per-test databases.'
  - 'Merge: combine run databases into a session or regression snapshot for analysis.'
  - 'Analyze: compare merged coverage against goals in `COVERAGE_PLAN.md`; record
    gaps in `COVERAGE_RUN.md`.'
  - 'Close: add targeted tests or refine coverpoints; re-run until must-cover bins
    are hit.'
  notes: From MODULE3 Design Architecture.
- type: code
  title: Coverage model — covergroups
  language: systemverilog
  source_file: common_dut/tb/stream_fifo_coverage.sv
  code: "  covergroup cg_ops;\n    option.per_instance = 1;\n    cp_op_type: coverpoint\
    \ op_type {\n      bins idle          = { 0 };\n      bins push_only     = { 1\
    \ };\n      bins pop_only      = { 2 };\n      bins push_and_pop  = { 3 };\n \
    \   }\n  endgroup\n\n  // -------------------------------------------------------------------------\n\
    \  // CG_LEVEL: Occupancy levels (empty / low / mid / high / full)\n  // -------------------------------------------------------------------------\n\
    \  covergroup cg_level;\n    option.per_instance = 1;\n    cp_level: coverpoint\
    \ level {\n      bins empty = { 0 };\n      bins low   = { [1 : (depth*25)/100]\
    \ };\n// ..."
- type: section
  title: Key files to study
- type: bullets
  title: Open these in the repo
  bullets:
  - '`module3/COVERAGE_DESIGN.md` — coverpoints, crosses, and requirement mapping'
  - '`module3/COVERAGE_RUN.md` — run logs, merge steps, and gap analysis notes'
  - '`common_dut/tb/stream_fifo_coverage.sv` — functional coverage implementation'
  - '`module2/COVERAGE_PLAN.md` — coverage goals and tier linkage'
  - '`scripts/module3.sh` — coverage design and TB presence checks'
  notes: Trace while running module3/EXAMPLES.md labs.
- type: section
  title: Verification & testing methods
- type: two_column
  title: 1. Coverage-driven verification (CDV)
  left:
  - Run a CORE-tier regression subset, merge coverage, and compare against goals in
    `COVERAGE_PLAN.md`.
  - Use gap analysis to add targeted tests or relax/remove low-value bins — not blind
    random runs.
  right: assets/diagrams/testing_methods.png
  notes: From MODULE3 Verification & Testing Methods.
- type: bullets
  title: 2. Closure loop
  bullets:
  - Requirements → tests → coverpoints → measured bins → updated plan/tests.
  - '`./scripts/module3.sh --check` expects covergroup references and coverage design
    docs.'
  notes: From MODULE3 Verification & Testing Methods.
- type: bullets
  title: 3. Reporting discipline
  bullets:
  - Log each run in `COVERAGE_RUN.md` with tool, seed, tier, and top uncovered items.
  notes: From MODULE3 Verification & Testing Methods.
- type: code
  title: sample() integration point
  language: systemverilog
  source_file: common_dut/tb/stream_fifo_coverage.sv
  code: "  function new(int depth_param = 16);\n    depth = depth_param;\n    cg_ops\
    \   = new();\n    cg_level = new();\n    cg_flags = new();\n  endfunction\n\n\
    \  // Call from monitor on posedge clk after driving level, op_type, overflow,\
    \ underflow\n  function void sample();\n    cg_ops.sample();\n    cg_level.sample();\n\
    \    cg_flags.sample();\n  endfunction"
- type: code
  title: Module 3 — coverage checks
  language: bash
  source_file: scripts/module3.sh
  code: '#!/usr/bin/env bash


    # Module 3: Coverage Planning & Analysis Orchestrator

    # This script summarizes and checks the coverage artifacts for Module 3.

    # Usage: ./scripts/module3.sh [OPTIONS]


    set -euo pipefail


    # Colors for output

    RED=''\033[0;31m''

    GREEN=''\033[0;32m''

    YELLOW=''\033[1;33m'''
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. From Coverage Plan to Concrete Model
  bullets:
  - Refinement of Coverage Goals
  - Translating high-level goals into specific covergroups and bins.
  - Deciding which metrics are *must-hit* vs *nice-to-have*.
  - Coverage Model Structure
  - Organizing covergroups by feature, interface, or component.
  - Choosing the right placement (agent monitor, scoreboard, reference model, etc.).
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 2. Functional Coverage Implementation (SV/UVM) (1/2)
  bullets:
  - Covergroup Basics
  - '`covergroup` declaration, sampling events (`@`), and options.'
  - 'Coverpoints: bins, ranges, wildcards, ignore/illegal bins.'
  - 'Cross coverage: when and how to cross (and when not to).'
  - Sampling Strategy
  - Sampling on transactions vs clocks vs protocol events.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 2. Functional Coverage Implementation (SV/UVM) (2/2)
  bullets:
  - Avoiding oversampling/undersampling.
  - Integration with UVM Components
  - Embedding covergroups in monitors/scoreboards.
  - Using analysis ports/exports for coverage sampling.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 3. Code Coverage Setup and Interpretation (1/2)
  bullets:
  - Enabling Code Coverage
  - Turning on statement/branch/toggle coverage in your simulator.
  - Handling compile-time options and run-time switches.
  - Interpreting Results
  - Reading coverage reports and understanding common metrics.
  - Distinguishing real gaps from unreachable or out-of-scope code.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 3. Code Coverage Setup and Interpretation (2/2)
  bullets:
  - Managing Exclusions
  - Identifying truly unreachable code.
  - Documenting exclusions and waivers with rationale.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 4. Running Coverage-Enabled Regressions (1/2)
  bullets:
  - Pilot Regressions
  - Start with a modest CORE-tier run (not full regression).
  - Ensure coverage data collection is working end-to-end.
  - Merging Coverage
  - Combining coverage from multiple tests/regressions.
  - Understanding how your tool merges coverage across runs and seeds.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 4. Running Coverage-Enabled Regressions (2/2)
  bullets:
  - Automating Coverage Collection
  - Hooks in your regression/CI scripts to generate coverage databases/reports.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 5. Coverage Analysis and Gap Closure (1/3)
  bullets:
  - Gap Identification
  - Finding unhit or low-hit coverpoints and crosses.
  - Detecting missing or ineffective coverage (bins that never can be hit).
  - Root-Cause Analysis
  - 'Is the gap due to:'
  - Missing or mis-specified tests?
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 5. Coverage Analysis and Gap Closure (2/3)
  bullets:
  - Overly tight constraints?
  - Incomplete coverage model?
  - Truly unreachable or out-of-scope functionality?
  - Closure Actions
  - Adding or modifying tests (directed or constrained-random).
  - Adjusting constraints or sequences.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 5. Coverage Analysis and Gap Closure (3/3)
  bullets:
  - Refining or pruning coverage points.
  - Documenting waivers where appropriate.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 6. Connecting Coverage to Requirements and Sign-off (1/2)
  bullets:
  - Traceability
  - Ensuring high-priority requirements are covered by both tests and coverage.
  - Updating `REQUIREMENTS_MATRIX.md` with coverage IDs and status.
  - Interpreting Coverage for Sign-off
  - Understanding when “100% coverage” is meaningful (and when it isn’t).
  - Combining coverage with bug metrics and expert judgment.
  notes: From MODULE3 Topics Covered.
- type: bullets
  title: 6. Connecting Coverage to Requirements and Sign-off (2/2)
  bullets:
  - Preparing for Later Modules
  - How coverage insights will influence later regression and sign-off modules.
  notes: From MODULE3 Topics Covered.
