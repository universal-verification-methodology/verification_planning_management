- type: bullets
  title: Overview
  bullets:
  - "This module establishes the foundation for **verification planning and management**.\
    \  \nInstead of starting from coding UVM components, you will start from the **specification\
    \ and DUT** and learn how to:"
- type: section
  title: Design architecture
- type: two_column
  title: 1. Stream FIFO DUT (shared course RTL)
  left:
  - 'Course DUT: `common_dut/rtl/stream_fifo.sv` — parameterizable `DEPTH` and `DATA_WIDTH`.'
  - 'Source interface: `s_valid`, `s_ready`, `s_data` (push when both valid and ready).'
  - 'Sink interface: `m_valid`, `m_ready`, `m_data` (pop on handshake).'
  - 'Internal storage: circular buffer (`mem`, `wr_ptr`, `rd_ptr`, `count`).'
  - 'Status outputs: `level`, sticky `overflow` / `underflow` on illegal handshakes.'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE1 Design Architecture.
- type: two_column
  title: 2. Planning-level verification view (Module 1)
  left:
  - No full UVM implementation required yet — document intended env boundaries in
    `VERIFICATION_PLAN.md`.
  - '`REQUIREMENTS_MATRIX.md` traces features → future tests and coverage bins.'
  - '`common_dut/tb/` holds skeleton stubs so architecture decisions are concrete,
    not abstract.'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE1 Design Architecture.
- type: code
  title: DUT — stream_fifo ports
  language: systemverilog
  source_file: common_dut/rtl/stream_fifo.sv
  code: "module stream_fifo #(\n  parameter int DATA_WIDTH = 8,\n  parameter int DEPTH\
    \      = 16\n) (\n  input  logic                     clk,\n  input  logic    \
    \                 rst_n,\n\n  // Source (input) interface\n  input  logic    \
    \                 s_valid,\n  input  logic [DATA_WIDTH-1:0]    s_data,\n  output\
    \ logic                     s_ready,\n\n  // Sink (output) interface\n  output\
    \ logic                     m_valid,\n  output logic [DATA_WIDTH-1:0]    m_data,\n\
    \  input  logic                     m_ready,\n\n  // Status\n// ..."
- type: code
  title: UVM env skeleton
  language: systemverilog
  source_file: common_dut/tb/stream_fifo_env_skeleton.sv
  code: "class stream_fifo_env_skeleton extends uvm_env;\n\n  stream_fifo_agent_skeleton\
    \ src_agent;\n  stream_fifo_agent_skeleton snk_agent;\n\n  `uvm_component_utils(stream_fifo_env_skeleton)\n\
    \n  function new(string name = \"stream_fifo_env_skeleton\", uvm_component parent\
    \ = null);\n    super.new(name, parent);\n  endfunction\n\n  function void build_phase(uvm_phase\
    \ phase);\n    super.build_phase(phase);\n    src_agent = stream_fifo_agent_skeleton::type_id::create(\"\
    src_agent\", this);\n    snk_agent = stream_fifo_agent_skeleton::type_id::create(\"\
    snk_agent\", this);\n  endfunction\n\n  function void connect_phase(uvm_phase\
    \ phase);\n// ..."
- type: section
  title: Verification & testing methods
- type: two_column
  title: 1. Planning-first methodology
  left:
  - Start from spec → scope → strategy before writing large amounts of testbench code.
  - Use risk-based prioritization to decide what to verify first in later modules.
  - Separate verification objectives (quality/risk) from implementation details.
  right: assets/diagrams/testing_methods.png
  notes: From MODULE1 Verification & Testing Methods.
- type: bullets
  title: 2. Test intent and validation (Module 1)
  bullets:
  - Capture test intents (names, goals, tiers) in the verification plan — not full
    UVM tests yet.
  - Directed vs constrained-random choices are documented with rationale for the FIFO
    DUT.
  - 'Self-check: `./scripts/module1.sh --check` validates planning artifacts; simulation
    is optional.'
  notes: From MODULE1 Verification & Testing Methods.
- type: bullets
  title: 3. Early closure thinking
  bullets:
  - Sketch functional coverage intent and regression tiers (sanity / nightly / full)
    for later modules.
  - Define sign-off preview criteria (coverage goals, bug bars) in the plan from day
    one.
  notes: From MODULE1 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. Verification Mindset and Goals (1/2)
  bullets:
  - Design vs Verification
  - What verification is responsible for (and what it is not).
  - “Bug-finding” vs “quality and risk management”.
  - Verification Objectives
  - Proving conformance to spec (as far as practical).
  - 'Managing risk: focusing on high-impact features and scenarios.'
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 1. Verification Mindset and Goals (2/2)
  bullets:
  - Balancing schedule, quality, and resources.
  - UVM/SV Context
  - Why constrained-random and coverage-driven verification (CDV) matter.
  - Where SV/UVM and Verilog DUTs fit in the overall flow.
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 2. From Specification to Verification Scope (1/2)
  bullets:
  - Requirements Intake
  - Extracting verifiable requirements from a product/design spec.
  - Identifying interfaces, modes, configurations, and corner cases.
  - Capturing assumptions and dependencies (e.g., upstream/downstream blocks, firmware
    behavior).
  - In-Scope vs Out-of-Scope
  - Deciding what this verification effort will and will not cover.
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 2. From Specification to Verification Scope (2/2)
  bullets:
  - Handling legacy behavior, debug features, and low-priority modes.
  - Risk-Based Prioritization
  - High-risk vs low-risk features.
  - Safety/criticality, complexity, novelty, and usage frequency.
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 3. Verification Strategy (SV/UVM Focus) (1/2)
  bullets:
  - Strategy Dimensions
  - Directed vs constrained-random vs scenario-based testing.
  - Use of reference models, assertions, and protocol checkers.
  - Layered testbench and reuse (block/IP → subsystem → SoC).
  - UVM Testbench Architecture Concepts
  - How your env/agent/sequence/scoreboard choices influence planning.
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 3. Verification Strategy (SV/UVM Focus) (2/2)
  bullets:
  - Mapping features and scenarios to sequences and configuration knobs.
  - Choosing Strategies for the DUT
  - 'For a FIFO: corner-case heavy, error injection, stress tests.'
  - 'For a bus/reg block: protocol correctness, access patterns, error responses.'
  - 'For a UART: timing, framing/parity errors, flow control.'
  notes: From MODULE1 Topics Covered.
- type: image
  title: 3. Verification flow
  image: assets/diagrams/verification_architecture.png
  caption: Stimulus, observation, and check strategy for this module.
- type: bullets
  title: 4. Test Planning and Test Catalogue Basics (1/2)
  bullets:
  - Test Intent vs Test Implementation
  - Writing test descriptions at the intent level (what to prove).
  - Mapping intents to one or more concrete UVM tests/sequences.
  - Test Types and Tiers
  - Smoke/sanity vs feature tests vs stress/error-injection.
  - Nightly vs weekly regressions (preview; detailed in later modules).
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 4. Test Planning and Test Catalogue Basics (2/2)
  bullets:
  - Early Test Catalogue
  - Building a first-pass list of 10–20 key tests/intents from the spec.
  - Tagging each with requirements, priority, and expected coverage impact.
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 5. Coverage Planning Primer (1/2)
  bullets:
  - Why Coverage is Central to Planning
  - Functional vs code coverage and their roles.
  - '“Coverage as a question”: what do you need to know to sleep at night?'
  - Sketching Coverage Models
  - Listing features, modes, and scenarios that deserve covergroups.
  - Identifying important crosses (e.g., mode × error type, address ranges × operations).
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 5. Coverage Planning Primer (2/2)
  bullets:
  - Defining Initial Coverage Goals
  - Setting measurable but realistic targets.
  - Separating “must cover” from “nice to have”.
  notes: From MODULE1 Topics Covered.
- type: bullets
  title: 6. Intro to Regression and Sign-off Thinking
  bullets:
  - Regression at a High Level
  - Why we need repeatable, automated regressions.
  - Basic tiers (sanity / nightly / full).
  - Sign-off Preview
  - 'Types of sign-off criteria: coverage, bug bars, waivers, stability.'
  - Why it’s important to think about exit criteria from Day 1.
  notes: From MODULE1 Topics Covered.
