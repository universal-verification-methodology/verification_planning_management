- type: section
  title: Design architecture
- type: two_column
  title: 1. Regression system architecture
  left:
  - Local quick loops, CI gated merges, optional farm for long suites (`REGRESSION_OPS.md`).
  - Regression launcher selects tier → test list → seeds → coverage merge → report
    artifacts.
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE5 Design Architecture.
- type: two_column
  title: 2. Advanced UVM orchestration
  left:
  - Virtual sequences coordinate multiple agents (e.g., concurrent source/sink traffic).
  - Callbacks and config DB patterns for mode switches without rewriting tests.
  - Documented in `ADVANCED_UVM_PLAN.md`; implemented under `common_dut/tb/`.
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE5 Design Architecture.
