- type: section
  title: Verification & testing methods
- type: two_column
  title: 1. Stimulus and checking flow
  left:
  - Sequences → driver → DUT → monitor → scoreboard compare and assertion sampling.
  - Reset, backpressure, and error-injection scenarios exercised per `TEST_PLAN.md`.
  right: assets/diagrams/testing_methods.png
  notes: From MODULE4 Verification & Testing Methods.
- type: bullets
  title: 2. Assertion-based verification (ABV)
  bullets:
  - Place assertions close to interfaces; use `assert`/`assume` policy consistent
    with your simulator flow.
  - Document waiver and severity policy for known benign cases.
  notes: From MODULE4 Verification & Testing Methods.
- type: bullets
  title: 3. Environment review
  bullets:
  - Peer/self review of `ENV_DESIGN.md` and `CHECKER_PLAN.md` before expanding regression
    scope.
  - '`./scripts/module4.sh --check` validates design docs and TB file presence.'
  notes: From MODULE4 Verification & Testing Methods.
- type: code
  title: stream_test — run_phase
  language: systemverilog
  source_file: module4/tb/stream_pkg.sv
  code: "class stream_test extends uvm_test;\n\n  `uvm_component_utils(stream_test)\n\
    \n  stream_env env;\n\n  function new(string name, uvm_component parent);\n  \
    \  super.new(name, parent);\n  endfunction\n\n  function void build_phase(uvm_phase\
    \ phase);\n    super.build_phase(phase);\n    env = stream_env::type_id::create(\"\
    env\", this);\n  endfunction\n\n  task run_phase(uvm_phase phase);\n    stream_seq\
    \ seq;\n\n// ..."
