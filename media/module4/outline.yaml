- type: section
  title: Design architecture
- type: two_column
  title: 1. Mature UVM environment (stream_fifo)
  left:
  - 'Env (`stream_fifo_env`): connects source/sink agents, scoreboard, coverage subscribers.'
  - 'Agents: driver + sequencer + monitor per interface; active vs passive roles documented
    in `ENV_DESIGN.md`.'
  - 'Transactions: item fields mirror DUT handshake semantics (data, valid/ready timing).'
  - 'Reference implementation sketch: `module4/tb/tb_stream_fifo_uvm.sv` and `stream_pkg.sv`
    patterns.'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE4 Design Architecture.
- type: two_column
  title: 2. Checking architecture
  left:
  - Scoreboard / reference model — golden data path and ordering checks (`CHECKER_PLAN.md`).
  - SVA — protocol and functional assertions on interfaces and internal flags.
  - 'Clear split: what is checked in SVA vs scoreboard vs test self-check.'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE4 Design Architecture.
- type: bullets
  title: 3. UVM phase execution flow
  bullets:
  - 'build_phase: create env, agents, scoreboard, coverage subscribers via factory.'
  - 'connect_phase: connect monitor analysis ports to scoreboard and coverage; tie
    virtual interfaces.'
  - 'run_phase: raise objection, start sequences on sequencers, wait for drain, drop
    objection.'
  - 'report_phase: summarize errors, assertion failures, and coverage sampling status.'
  - Top module `module4/tb/tb_stream_fifo_uvm.sv` instantiates DUT and calls `run_test()`.
  notes: From MODULE4 Design Architecture.
- type: code
  title: DUT instantiation in UVM top
  language: systemverilog
  source_file: module4/tb/tb_stream_fifo_uvm.sv
  code: "  // DUT instance\n  stream_fifo #(\n    .DATA_WIDTH (DATA_WIDTH),\n    .DEPTH\
    \      (DEPTH)\n  ) dut (\n    .clk       (clk),\n    .rst_n     (rst_n),\n  \
    \  // source side\n    .s_valid   (s_if.valid),\n    .s_data    (s_if.data),\n\
    \    .s_ready   (s_if.ready),\n    // sink side\n    .m_valid   (m_if.valid),\n\
    \    .m_data    (m_if.data),\n    .m_ready   (m_if.ready),\n    // status\n  \
    \  .level     (level),\n    .overflow  (overflow),\n// ..."
- type: code
  title: stream_env — build & connect
  language: systemverilog
  source_file: module4/tb/stream_pkg.sv
  code: "class stream_env extends uvm_env;\n\n  `uvm_component_utils(stream_env)\n\
    \n  stream_driver     drv;\n  stream_monitor    mon;\n  stream_scoreboard sb;\n\
    \n  function new(string name, uvm_component parent);\n    super.new(name, parent);\n\
    \  endfunction\n\n  function void build_phase(uvm_phase phase);\n    super.build_phase(phase);\n\
    \    drv = stream_driver    ::type_id::create(\"drv\", this);\n    mon = stream_monitor\
    \   ::type_id::create(\"mon\", this);\n    sb  = stream_scoreboard::type_id::create(\"\
    sb\",  this);\n\n// ..."
- type: code
  title: Scoreboard write() hook
  language: systemverilog
  source_file: module4/tb/stream_pkg.sv
  code: "class stream_scoreboard extends uvm_component;\n\n  `uvm_component_utils(stream_scoreboard)\n\
    \n  uvm_analysis_imp #(stream_item, stream_scoreboard) imp_in;\n\n  int unsigned\
    \ num_seen;\n\n  function new(string name, uvm_component parent);\n    super.new(name,\
    \ parent);\n    imp_in = new(\"imp_in\", this);\n    num_seen = 0;\n  endfunction\n\
    \n  // Called for each transaction seen by the monitor\n  function void write(stream_item\
    \ t);\n    num_seen++;\n    `uvm_info(get_type_name(),\n// ..."
