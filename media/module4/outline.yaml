- type: bullets
  title: What you should know (1/2)
  bullets:
  - Describe and justify your UVM environment and agent architecture.
  - Implement and maintain drivers, monitors, sequencers, and transactions that match
    your DUT and test plan.
  - Implement or integrate scoreboards and reference models for robust checking.
  - Design and place protocol and functional assertions that support your verification
    goals.
  - Configure your environment for different modes and regression tiers.
  - UVM env/agent architecture documented in `module4/ENV_DESIGN.md`.
  notes: From MODULE4 Learning Outcomes.
- type: bullets
  title: What you should know (2/2)
  bullets:
