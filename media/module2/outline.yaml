- type: section
  title: Design architecture
- type: two_column
  title: 1. UVM environment skeleton
  left:
  - '`common_dut/tb/stream_fifo_env_skeleton.sv` — env + agent stubs (source/sink
    agents).'
  - 'Hierarchy: `uvm_test` → `stream_fifo_env` → agents → (future) driver, sequencer,
    monitor.'
  - Interfaces tie to DUT ports via virtual interfaces or pin-level connections in
    the top testbench.
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE2 Design Architecture.
- type: two_column
  title: 2. Test-plan ↔ TB mapping
  left:
  - '`TEST_PLAN.md` catalogue entries map to UVM tests, sequences, and config knobs.'
  - '`REGRESSION_PLAN.md` defines tiers that will eventually select subsets of tests.'
  - Naming conventions (`SMK_`, `FTR_`, `ERR_`) link documentation to future `uvm_test`
    names.
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE2 Design Architecture.
- type: code
  title: Handshake logic (push/pop)
  language: systemverilog
  source_file: common_dut/rtl/stream_fifo.sv
  code: "  assign s_ready = (count < DEPTH);\n  assign m_valid = (count != 0);\n \
    \ assign level   = count;\n\n  // Determine when to push/pop\n  always_comb begin\n\
    \    push = s_valid && s_ready;\n    pop  = m_valid && m_ready;\n  end"
- type: code
  title: Agent stub — build_phase
  language: systemverilog
  source_file: common_dut/tb/stream_fifo_env_skeleton.sv
  code: "class stream_fifo_agent_skeleton extends uvm_agent;\n\n  `uvm_component_utils(stream_fifo_agent_skeleton)\n\
    \n  function new(string name = \"stream_fifo_agent_skeleton\", uvm_component parent\
    \ = null);\n    super.new(name, parent);\n  endfunction\n\n  function void build_phase(uvm_phase\
    \ phase);\n    super.build_phase(phase);\n    // Stub: add driver, sequencer,\
    \ monitor in later modules\n  endfunction\n\n  function void connect_phase(uvm_phase\
    \ phase);\n    super.connect_phase(phase);\n    // Stub: connect driver to sequencer,\
    \ etc.\n  endfunction\n\n// ..."
- type: section
  title: Verification & testing methods
- type: two_column
  title: 1. Test taxonomy
  left:
  - Smoke/sanity — fast checks after every change; feature — per-requirement depth.
  - Stress / long-run — backlog pressure, sustained traffic; error injection — overflow,
    underflow, illegal sequences.
  - Each type documents expected runtime class and whether seeds are fixed or varied.
  right: assets/diagrams/testing_methods.png
  notes: From MODULE2 Verification & Testing Methods.
- type: bullets
  title: 2. Regression tiering (planning level)
  bullets:
  - Assign every catalogue test to sanity, core, stress, or full tiers.
  - Document pass/fail policy preview and which negative tests are safe for frequent
    runs.
  - '`./scripts/module2.sh --check` verifies plan completeness and TB skeleton presence.'
  notes: From MODULE2 Verification & Testing Methods.
- type: bullets
  title: 3. Reproducibility
  bullets:
  - Plan seed strategy, constraint overrides, and plusargs per test for debuggable
    random runs.
  notes: From MODULE2 Verification & Testing Methods.
- type: section
  title: Syllabus topics
- type: bullets
  title: 1. Test Taxonomy and Structure (1/2)
  bullets:
  - Test Types
  - Smoke/sanity vs feature vs stress vs error-injection vs performance (if applicable).
  - Directed vs constrained-random vs scenario-based tests.
  - Tiers and Frequency
  - Per-commit / pre-push tests.
  - Nightly regression suites.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 1. Test Taxonomy and Structure (2/2)
  bullets:
  - Weekly full or long-running suites.
  - Mapping to UVM
  - How test types relate to UVM tests and sequences.
  - Using configuration objects / plusargs / factory overrides to specialize tests.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 2. Test Catalogue Refinement (1/2)
  bullets:
  - From List to Catalogue
  - Expanding the initial 10–20 test intents into a more complete catalogue.
  - Grouping tests by feature, interface, or requirement group.
  - Naming and Metadata
  - Test ID conventions (e.g., `SMK_`, `FTR_`, `STR_`, `ERR_` prefixes).
  - 'Metadata: owner, runtime class (short/medium/long), deterministic vs random,
    seed handling.'
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 2. Test Catalogue Refinement (2/2)
  bullets:
  - Redundancy and Value
  - Identifying overlapping tests and merging where reasonable.
  - Distinguishing “coverage-driving” tests vs “regression guardrail” tests.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 3. Negative, Stress, and Corner-Case Planning (1/2)
  bullets:
  - Negative Testing
  - Illegal sequences, protocol violations, out-of-range values.
  - Malformed packets/transactions, timing violations (where meaningful).
  - Stress and Long-Run Scenarios
  - High-load / long-duration tests.
  - Pseudo-random traffic, back-to-back operations, resource exhaustion.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 3. Negative, Stress, and Corner-Case Planning (2/2)
  bullets:
  - Corner Cases
  - Boundary values, wrap-around conditions, reset-in-the-middle, mode transitions.
  - Instrumentation Needs
  - What additional checks, monitors, or assertions are needed to support these tests.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 4. Seeds, Constraints, and Reproducibility (1/2)
  bullets:
  - Seed Strategy
  - When to fix seeds vs vary them.
  - How to record seeds for debugging and reproducibility.
  - Constraints and Randomization Control
  - High-level constraints in sequences vs constraint overrides per test.
  - Guarding against “over-constrained” tests that hide bugs.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 4. Seeds, Constraints, and Reproducibility (2/2)
  bullets:
  - Test Parameters and Configurations
  - Using UVM configuration database, plusargs, or config files.
  - Planning for parametrization (e.g., data width, depth, mode).
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 5. Regression Tiering and Policies (Planning Level) (1/2)
  bullets:
  - Regression Tiers
  - Tier definitions (e.g., `sanity`, `core_feature`, `stress`, `full`).
  - Target runtimes and approximate test counts for each tier.
  - Test Assignment
  - Mapping each test in the catalogue to one or more tiers.
  - Deciding which negative/stress tests are safe for frequent runs.
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 5. Regression Tiering and Policies (Planning Level) (2/2)
  bullets:
  - Pass/Fail Policies (Preview)
  - What counts as a pass, fail, flake.
  - Basic quarantine strategy for flaky tests (details in later modules).
  notes: From MODULE2 Topics Covered.
- type: bullets
  title: 6. Coordination with Coverage and Requirements
  bullets:
  - Closing Loops with Requirements
  - Ensuring each high-priority requirement has enough tests (not just one).
  - Verifying that tests exercise planned coverage points.
  - Coverage-Driven Test Gaps
  - Identifying missing tests from coverage perspective (e.g., unhit bins).
  - Planning targeted tests to close meaningful coverage holes.
  notes: From MODULE2 Topics Covered.
