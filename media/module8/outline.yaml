- type: section
  title: Verification & testing methods
- type: two_column
  title: 1. Full-lifecycle testing
  left:
  - Execute planned regression tiers with coverage merge and documented closure status.
  - Include negative, stress, and protocol/rule tests appropriate to your capstone
    DUT.
  right: assets/diagrams/testing_methods.png
  notes: From MODULE8 Verification & Testing Methods.
- type: bullets
  title: 2. Sign-off and delivery testing
  bullets:
  - Define explicit exit criteria (coverage %, bug bar, stability window).
  - 'Retrospective: what worked, gaps, and improvements for a real project review.'
  notes: From MODULE8 Verification & Testing Methods.
- type: bullets
  title: 3. Validation
  bullets:
