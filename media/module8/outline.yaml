  notes: From MODULE8 Verification & Testing Methods.
- type: code
  title: Capstone checklist excerpt
  language: markdown
  source_file: module8/templates/CHECKLIST.md
  code: '# Module 8 Checklist – Capstone: End‑to‑End Verification & VIP Delivery


    > **Purpose**: Track completion of your major capstone project.


    > **Instructions**: Check off items as you complete them. Copy from `module8/templates/`
    if needed, or edit the file in `module8/` directly. Reference: `module8/.solutions/`.


    ## 1. Capstone Definition


    - [ ] Capstone project chosen and described in `CAPSTONE_PROJECT.md`.

    - [ ] Key requirements and success criteria documented.

    - [ ] Scope (block/subsystem/VIP) clearly defined and realistic for the time frame.


    ## 2. Re‑use of Earlier Modules


    - [ ] Existing plans (verification, test, coverage, regression) referenced and
    extended, not reinvented.

    - [ ] UVM env/checker designs from Modules 4–6 reused or evolved.

    - [ ] Regression and orchestration concepts from Module 5 applied.


    // ...'
