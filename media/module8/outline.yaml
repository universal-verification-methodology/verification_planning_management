- type: section
  title: Design architecture
- type: two_column
  title: 1. Capstone system architecture
  left:
  - '`CAPSTONE_PROJECT.md` defines DUT hierarchy, interfaces, clocks, and verification
    scope.'
  - 'Apply Modules 1–7 artifacts: plans, env, VIP (if applicable), coverage, regression
    ops.'
  - 'Deliverable layout: RTL, UVM env, tests, scripts, and user-facing documentation.'
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE8 Design Architecture.
- type: two_column
  title: 2. End-to-end verification package
  left:
  - Single coherent verification solution or VIP another team can integrate.
  - Traceability matrix from requirements through tests, coverage, and sign-off criteria.
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE8 Design Architecture.
- type: bullets
  title: 3. Capstone delivery and handoff workflow
  bullets:
  - 'Plan: consolidate Modules 1–2 plans into capstone scope and test/regression strategy.'
  - 'Build: mature env, checkers, coverage, and VIP (Module 4–7 artifacts) under `rtl/`
    and `tb/`.'
  - 'Execute: run sanity → core → stress tiers; merge coverage; triage failures with
    saved seeds.'
  - 'Sign off: meet exit criteria in `CAPSTONE_PROJECT.md`; complete `CHECKLIST.md`.'
  - 'Deliver: package RTL, UVM env, tests, scripts, and user docs for another team
    to integrate.'
  notes: From MODULE8 Design Architecture.
