- type: section
  title: Practice & assessment
- type: bullets
  title: What you should know (1/2)
  bullets:
  - Drive an end‑to‑end verification effort from requirements → plan → env → tests
    → coverage → regressions → sign‑off.
  - Deliver a coherent, documented verification package or VIP that others can understand
    and use.
  - Reflect on trade‑offs and improvements as if you were preparing for a real project
    review.
  - A clearly defined capstone project documented in `capstone_project.md`.
  - Evidence that Modules 1–7 have been applied (plans, env, tests, coverage, regressions).
  - A “deliverable” verification solution or VIP (code + docs) that could be handed
    to another team.
  notes: From MODULE8 Learning Outcomes.
- type: bullets
  title: What you should know (2/2)
  bullets:
  - A short written or presented retrospective on what worked, what didn’t, and what
    you’d improve next.
  notes: From MODULE8 Learning Outcomes.
- type: bullets
  title: Assessment checklist
  bullets:
  - A clearly defined capstone project documented in `capstone_project.md`.
  - Evidence that Modules 1–7 have been applied (plans, env, tests, coverage, regressions).
  - A “deliverable” verification solution or VIP (code + docs) that could be handed
    to another team.
  - A short written or presented retrospective on what worked, what didn’t, and what
    you’d improve next.
