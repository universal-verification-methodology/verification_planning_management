- type: bullets
  title: Overview
  bullets:
  - "Modules 1–6 built up your **skills and infrastructure**.  \nModule 7 is about\
    \ **applying** them to realistic verification challenges:"
- type: section
  title: Design architecture
- type: two_column
  title: 1. Real-world DUT / subsystem
  left:
  - Choose DMA-style block, bus/register IP, or protocol DUT (UART/SPI/I2C/AXI-lite
    style).
  - Document block diagram, clocks/resets, and interface contracts in `PROJECTS.md`.
  right: assets/diagrams/rtl_architecture.png
  notes: From MODULE7 Design Architecture.
- type: two_column
  title: 2. VIP package architecture
  left:
  - 'Reusable VIP: agent, sequencer, driver, monitor, checker, coverage, config objects.'
  - '`VIP_DESIGN.md` defines public API, sequences, and integration guide for adopters.'
  - 'Package boundaries: what integrators configure vs what VIP owns internally.'
  right: assets/diagrams/verification_architecture.png
  notes: From MODULE7 Design Architecture.
- type: bullets
  title: 3. Production layout
  bullets:
  - Separate `rtl/`, `tb/`, `tests/`, `docs/` with consistent naming for handoff to
    another team.
  notes: From MODULE7 Design Architecture.
